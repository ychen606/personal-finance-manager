{% extends "base.html" %}

{% block title %}Log in — Personal Finance Manager{% endblock %}

{% block content %}
<div class="card">
    <h1>Log in</h1>

    {% if form.errors %}
        <p class="errorlist">Invalid username or password.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            {{ form.password }}
        </div>
        <button type="submit">Log in</button>
    </form>

    <div class="links">
        <p>Don't have an account? <a href="{% url 'accounts:register' %}">Sign up</a></p>
    </div>
</div>
{% endblock %}
